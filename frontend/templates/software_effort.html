<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Effort Estimator | Project Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .result-card {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: center;
            display: none;
        }
        .result-card.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .effort-value {
            font-size: 48px;
            font-weight: 700;
            margin: 20px 0;
        }
        .effort-label {
            font-size: 18px;
            opacity: 0.95;
        }
        .submit-btn {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            color: #dc2626;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            background-color: #fef2f2;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="8" fill="#6366f1"/>
                    <path d="M20 10L28 18H24V26H16V18H12L20 10Z" fill="white"/>
                </svg>
                <h1>Predictor</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-item">
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('predict_software') }}" class="nav-item active">
                    <span>Software Effort</span>
                </a>
                <a href="{{ url_for('predict_construction') }}" class="nav-item">
                    <span>Construction Cost</span>
                </a>
                <a href="{{ url_for('logout') }}" class="nav-item logout">
                    <span>Logout</span>
                </a>
            </nav>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <h2>Software Project Effort Estimator</h2>
                <div class="user-menu">
                    <span id="username">{{ session.get('username', 'User') }}</span>
                </div>
            </div>

            <div class="content-area">
                <div class="form-container">
                    <div class="form-card">
                        <h2>Estimate Project Effort</h2>
                        <p class="form-description">Enter your project details to get an effort estimate in hours</p>

                        <div class="error-message" id="errorMessage"></div>

                        <form id="effortForm">
                            <div class="form-grid">
                                <!-- TeamExp -->
                                <div class="form-group">
                                    <label for="teamExp">Team Experience (Years)</label>
                                    <input 
                                        type="number" 
                                        id="teamExp" 
                                        name="teamExp"
                                        min="1" 
                                        max="15" 
                                        value="5"
                                        required
                                    >
                                </div>

                                <!-- ManagerExp -->
                                <div class="form-group">
                                    <label for="managerExp">Manager Experience (Years)</label>
                                    <input 
                                        type="number" 
                                        id="managerExp" 
                                        name="managerExp"
                                        min="1" 
                                        max="15" 
                                        value="5"
                                        required
                                    >
                                </div>

                                <!-- Transactions -->
                                <div class="form-group">
                                    <label for="transactions">Transactions</label>
                                    <input 
                                        type="number" 
                                        id="transactions" 
                                        name="transactions"
                                        min="10" 
                                        max="500" 
                                        value="200"
                                        required
                                    >
                                </div>

                                <!-- Entities -->
                                <div class="form-group">
                                    <label for="entities">Entities</label>
                                    <input 
                                        type="number" 
                                        id="entities" 
                                        name="entities"
                                        min="10" 
                                        max="200" 
                                        value="50"
                                        required
                                    >
                                </div>

                                <!-- PointsNonAdjust -->
                                <div class="form-group">
                                    <label for="pointsNonAdjust">Points Non Adjust</label>
                                    <input 
                                        type="number" 
                                        id="pointsNonAdjust" 
                                        name="pointsNonAdjust"
                                        min="50" 
                                        max="500" 
                                        value="250"
                                        required
                                    >
                                </div>

                                <!-- Adjustment -->
                                <div class="form-group">
                                    <label for="adjustment">Adjustment</label>
                                    <input 
                                        type="number" 
                                        id="adjustment" 
                                        name="adjustment"
                                        min="0.80" 
                                        max="1.50" 
                                        step="0.01"
                                        value="1.0"
                                        required
                                    >
                                </div>

                                <!-- LanguageLevel -->
                                <div class="form-group">
                                    <label for="languageLevel">Language Level</label>
                                    <select 
                                        id="languageLevel" 
                                        name="languageLevel"
                                        required
                                    >
                                        <option value="1">1</option>
                                        <option value="2" selected>2</option>
                                        <option value="3">3</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="submit-btn">
                                <span class="button-text">Estimate Effort</span>
                                <span class="button-loader" style="display: none;">
                                    <span class="spinner"></span> Calculating...
                                </span>
                            </button>
                        </form>

                        <div class="result-card" id="resultCard">
                            <div class="effort-label">Estimated Effort</div>
                            <div class="effort-value" id="effortValue">0</div>
                            <div style="font-size: 16px; margin-bottom: 10px;">hours</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.getElementById('effortForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = this;
            const submitBtn = form.querySelector('button[type="submit"]');
            const buttonText = submitBtn.querySelector('.button-text');
            const buttonLoader = submitBtn.querySelector('.button-loader');
            const errorMessage = document.getElementById('errorMessage');
            const resultCard = document.getElementById('resultCard');

            // Reset error
            errorMessage.classList.remove('show');

            // Validate all fields
            const teamExp = parseInt(document.getElementById('teamExp').value);
            const managerExp = parseInt(document.getElementById('managerExp').value);
            const transactions = parseInt(document.getElementById('transactions').value);
            const entities = parseInt(document.getElementById('entities').value);
            const pointsNonAdjust = parseInt(document.getElementById('pointsNonAdjust').value);
            const adjustment = parseFloat(document.getElementById('adjustment').value);
            const languageLevelValue = document.getElementById('languageLevel').value;
            const languageLevel = languageLevelValue ? parseInt(languageLevelValue) : null;

            // Check if all fields are valid
            if (!teamExp || !managerExp || !transactions || !entities || !pointsNonAdjust || !adjustment || !languageLevel) {
                showError('All fields are required');
                return;
            }

            // Collect form data
            const data = {
                project_type: "software",
                team_exp: teamExp,
                manager_exp: managerExp,
                transactions: transactions,
                entities: entities,
                points_non_adjust: pointsNonAdjust,
                adjustment: adjustment,
                language_level: languageLevel
            };

            // Show loading state
            submitBtn.disabled = true;
            buttonText.style.display = 'none';
            buttonLoader.style.display = 'flex';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById('effortValue').textContent = (result.predicted_effort != null ? Math.round(result.predicted_effort) : 0).toLocaleString();
                    resultCard.classList.add('show');
                } else {
                    showError(result.error || 'Failed to estimate effort');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('An error occurred. Please try again.');
            } finally {
                submitBtn.disabled = false;
                buttonText.style.display = 'inline';
                buttonLoader.style.display = 'none';
            }
        });

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
